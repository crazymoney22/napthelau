<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung Tâm Nạp Robux Chính Thức</title>
    <style>
        /* --- RESET & CHỦ ĐỀ CHUNG --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #11141a;
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- THANH ĐIỀU HƯỚNG --- */
        header {
            background-color: #1a1f29;
            padding: 15px 0;
            border-bottom: 2px solid #2a3245;
            margin-bottom: 30px;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00e676;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- KHU VỰC THÔNG TIN TÀI KHOẢN --- */
        .section-box {
            background-color: #1a1f29;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a3245;
        }
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00e676;
        }
        .section-title span {
            background: #00e676;
            color: #11141a;
            width: 24px;
            height: 24px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 400px;
        }
        .input-group input {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #3a455c;
            background-color: #11141a;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #00e676;
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.2);
        }

        /* --- DANH SÁCH GÓI NẠP (GRID) --- */
        .grid-packages {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .package-card {
            background-color: #222938;
            border: 2px solid #3a455c;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .package-card:hover {
            transform: translateY(-5px);
            border-color: #00e676;
        }
        .package-card.selected {
            border-color: #00e676;
            background-color: #1b2d2a;
        }
        .package-card.selected::after {
            content: "✓";
            position: absolute;
            top: 0;
            right: 0;
            background: #00e676;
            color: #11141a;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: bold;
            border-bottom-left-radius: 8px;
        }
        .robux-icon {
            font-size: 35px;
            margin-bottom: 10px;
        }
        .robux-amount {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }
        .package-price {
            color: #b0bec5;
            font-size: 15px;
        }

        /* --- PHƯƠNG THỨC THANH TOÁN --- */
        .payment-methods {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .method-card {
            flex: 1;
            min-width: 150px;
            background-color: #222938;
            border: 2px solid #3a455c;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .method-card:hover {
            border-color: #00e676;
        }
        .method-card.selected {
            border-color: #00e676;
            background-color: #1b2d2a;
        }

        /* --- NÚT THANH TOÁN --- */
        .btn-submit {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 30px auto 0 auto;
            padding: 15px;
            background-color: #00e676;
            color: #11141a;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .btn-submit:hover {
            background-color: #00b359;
            box-shadow: 0 5px 15px rgba(0, 230, 118, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <div class="logo">RoboZone</div>
            <div style="color: #b0bec5;">Hỗ trợ 24/7</div>
        </div>
    </header>

    <div class="container">
        
        <div class="section-box">
            <div class="section-title"><span>1</span> Nhập thông tin tài khoản</div>
            <div class="input-group">
                <label for="username">Tên đăng nhập Roblox (Username):</label>
                <input type="text" id="username" placeholder="Ví dụ: RobloxPlayer123" required>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title"><span>2</span> Chọn gói Robux</div>
            <div class="grid-packages">
                
                <div class="package-card" onclick="selectPackage(this, 80, '25.000đ')">
                    <div class="robux-icon">💎</div>
                    <div class="robux-amount">80 Robux</div>
                    <div class="package-price">25.000 đ</div>
                </div>

                <div class="package-card" onclick="selectPackage(this, 400, '120.000đ')">
                    <div class="robux-icon">💎</div>
                    <div class="robux-amount">400 Robux</div>
                    <div class="package-price">120.000 đ</div>
                </div>

                <div class="package-card" onclick="selectPackage(this, 800, '230.000đ')">
                    <div class="robux-icon">💎</div>
                    <div class="robux-amount">800 Robux</div>
                    <div class="package-price">230.000 đ</div>
                </div>

                <div class="package-card" onclick="selectPackage(this, 1700, '480.000đ')">
                    <div class="robux-icon">💎</div>
                    <div class="robux-amount">1,700 Robux</div>
                    <div class="package-price">480.000 đ</div>
                </div>

                <div class="package-card" onclick="selectPackage(this, 4500, '1.200.000đ')">
                    <div class="robux-icon">💎</div>
                    <div class="robux-amount">4,500 Robux</div>
                    <div class="package-price">1.200.000 đ</div>
                </div>

            </div>
        </div>

        <div class="section-box">
            <div class="section-title"><span>3</span> Chọn phương thức thanh toán</div>
            <div class="payment-methods">
                <div class="method-card" onclick="selectPayment(this, 'Ví MoMo')">Ví MoMo</div>
                <div class="method-card" onclick="selectPayment(this, 'Thẻ Ngân Hàng (ATM)')">Thẻ Ngân Hàng (ATM)</div>
                <div class="method-card" onclick="selectPayment(this, 'Thẻ Cào Điện Thoại')">Thẻ Cào Điện Thoại</div>
            </div>
        </div>

        <button class="btn-submit" onclick="processOrder()">NẠP NGAY</button>

    </div>

    <script>
        let selectedRobux = null;
        let selectedPrice = null;
        let selectedMethod = null;

        function selectPackage(element, robux, price) {
            // Xóa trạng thái chọn của các gói khác
            document.querySelectorAll('.package-card').forEach(card => card.classList.remove('selected'));
            // Thêm trạng thái chọn vào gói hiện tại
            element.classList.add('selected');
            selectedRobux = robux;
            selectedPrice = price;
        }

        function selectPayment(element, method) {
            // Xóa trạng thái chọn của các phương thức khác
            document.querySelectorAll('.method-card').forEach(card => card.classList.remove('selected'));
            // Thêm trạng thái chọn vào phương thức hiện tại
            element.classList.add('selected');
            selectedMethod = method;
        }

        function processOrder() {
            const username = document.getElementById('username').value.trim();

            if (!username) {
                alert("Vui lòng nhập tên tài khoản Roblox của bạn!");
                return;
            }
            if (!selectedRobux) {
                alert("Vui lòng chọn một gói Robux cần nạp!");
                return;
            }
            if (!selectedMethod) {
                alert("Vui lòng chọn phương thức thanh toán!");
                return;
            }

            // Hiển thị thông báo giả lập xác nhận đơn hàng thành công
            alert(`Đơn hàng của bạn đã được ghi nhận!\n\nTài khoản: ${username}\nGói nạp: ${selectedRobux} Robux\nSố tiền: ${selectedPrice}\nPhương thức: ${selectedMethod}\n\nHệ thống đang xử lý giao dịch!`);
        }
    </script>
</body>
</html>
