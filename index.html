<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nạp Thẻ Tự Động</title>
    <style>
        /* --- CẤU HÌNH GIAO DIỆN CHUNG --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #e3e6ed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .napthe-container {
            background-color: #161b26;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid #232d3f;
        }

        h2 {
            text-align: center;
            margin-bottom: 8px;
            color: #ff9f43;
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #8a99ad;
            margin-bottom: 25px;
        }

        /* --- THIẾT KẾ FORM --- */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background-color: #0f111a;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: #ff9f43;
            box-shadow: 0 0 8px rgba(255, 159, 67, 0.2);
        }

        /* Tùy chỉnh danh sách lựa chọn */
        select option {
            background: #161b26;
            color: white;
        }

        /* --- NÚT BẤM --- */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff9f43, #ff6b6b);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            opacity: 0.9;
            box-shadow: 0 4px 15px rgba(255, 114, 94, 0.4);
        }

        /* --- LƯU Ý --- */
        .note-box {
            background-color: rgba(255, 159, 67, 0.1);
            border-left: 4px solid #ff9f43;
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 13px;
            color: #ffb061;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="napthe-container">
    <h2>Nạp Thẻ Cào Tự Động</h2>
    <div class="subtitle">Hệ thống xử lý thẻ cào siêu tốc 3s - 5s</div>

    <form id="naptheForm" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
            <label for="username">Tên tài khoản / ID Game:</label>
            <input type="text" id="username" placeholder="Nhập tài khoản cần nạp..." required>
        </div>

        <div class="form-group">
            <label for="telco">Chọn nhà mạng:</label>
            <select id="telco" required>
                <option value="">-- Chọn loại thẻ --</option>
                <option value="VIETTEL">Viettel</option>
                <option value="MOBIFONE">Mobifone</option>
                <option value="VINAPHONE">Vinaphone</option>
                <option value="ZING">Thẻ Zing</option>
                <option value="GATE">Thẻ Gate</option>
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Mệnh giá thẻ:</label>
            <select id="amount" required>
                <option value="">-- Chọn mệnh giá --</option>
                <option value="10000">10,000 đ</option>
                <option value="20000">20,000 đ</option>
                <option value="50000">50,000 đ</option>
                <option value="100000">100,000 đ</option>
                <option value="200000">200,000 đ</option>
                <option value="500000">500,000 đ</option>
                <option value="1000000">1,000,000 đ</option>
            </select>
        </div>

        <div class="form-group">
            <label for="code">Mã số thẻ (Dưới lớp bạc):</label>
            <input type="text" id="code" placeholder="Nhập mã thẻ..." pattern="[0-9a-zA-Z]+" title="Mã thẻ chỉ gồm số hoặc chữ" required>
        </div>

        <div class="form-group">
            <label for="serial">Số Seri thẻ:</label>
            <input type="text" id="serial" placeholder="Nhập số seri..." pattern="[0-9a-zA-Z]+" title="Số seri chỉ gồm số hoặc chữ" required>
        </div>

        <button type="submit" class="btn-submit">Nạp Thẻ Ngay</button>
    </form>

    <div class="note-box">
        <strong>* Lưu ý quan trọng:</strong> 
        <br>- Vui lòng chọn đúng nhà mạng và mệnh giá. Sai mệnh giá sẽ bị phạt mất 100% giá trị thẻ.
        <br>- Giữ lại thẻ cho đến khi hệ thống báo nạp thành công.
    </div>
</div>

<script>
    function handleFormSubmit(event) {
        event.preventDefault(); // Ngăn trang web tải lại khi bấm nút

        // Lấy dữ liệu từ các ô nhập
        const username = document.getElementById('username').value.trim();
        const telco = document.getElementById('telco').value;
        const amount = parseInt(document.getElementById('amount').value).toLocaleString('vi-VN') + 'đ';
        const code = document.getElementById('code').value.trim();
        const serial = document.getElementById('serial').value.trim();

        // Hiển thị thông tin kiểm tra (Giả lập gửi dữ liệu)
        alert(`Gửi thông tin thẻ thành công!\n\n` +
              `• Tài khoản: ${username}\n` +
              `• Loại thẻ: ${telco}\n` +
              `• Mệnh giá: ${amount}\n` +
              `• Mã thẻ: ${code}\n` +
              `• Số Seri: ${serial}\n\n` +
              `Hệ thống đang kiểm tra thẻ, vui lòng đợi!`);
              
        // Xóa trắng form sau khi nạp xong
        document.getElementById('naptheForm').reset();
    }
</script>

</body>
</html>
